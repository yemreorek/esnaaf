name: Deploy to Google Cloud Run

on:
  push:
    branches:
      - main

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
  GCP_REGION: europe-west3 # Frankfurt region (closest to Turkey for low latency)
  GAR_REPO: esnaaf-repo

jobs:
  deploy-backend:
    name: Build & Deploy Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate with Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ env.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCP
        run: |
          gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and Push Docker Image
        run: |
          IMAGE_NAME="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPO }}/esnaaf-backend:latest"
          docker build -t $IMAGE_NAME backend-api
          docker push $IMAGE_NAME

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: esnaaf-backend
          image: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPO }}/esnaaf-backend:latest
          region: ${{ env.GCP_REGION }}
          flags: |
            --allow-unauthenticated
            --session-affinity
            --timeout=3600
            --port=3000
            --min-instances=1
            --concurrency=80
            --cpu=1
            --memory=512Mi

  deploy-musteri-frontend:
    name: Build & Deploy Customer Web App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate with Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ env.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCP
        run: |
          gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and Push Docker Image
        run: |
          IMAGE_NAME="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPO }}/esnaaf-musteri:latest"
          docker build \
            --build-arg NEXT_PUBLIC_API_URL="https://esnaaf-backend-339090537138.europe-west3.run.app" \
            --build-arg NEXT_PUBLIC_WS_URL="https://esnaaf-backend-339090537138.europe-west3.run.app" \
            -t $IMAGE_NAME app-musteri
          docker push $IMAGE_NAME

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: esnaaf-musteri
          image: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPO }}/esnaaf-musteri:latest
          region: ${{ env.GCP_REGION }}
          flags: |
            --allow-unauthenticated
            --port=3000
            --min-instances=1

  deploy-hizmetveren-frontend:
    name: Build & Deploy Provider Web App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate with Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ env.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCP
        run: |
          gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and Push Docker Image
        run: |
          IMAGE_NAME="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPO }}/esnaaf-hizmetveren:latest"
          docker build \
            --build-arg NEXT_PUBLIC_API_URL="https://esnaaf-backend-339090537138.europe-west3.run.app" \
            --build-arg NEXT_PUBLIC_WS_URL="https://esnaaf-backend-339090537138.europe-west3.run.app" \
            -t $IMAGE_NAME app-hizmetveren
          docker push $IMAGE_NAME

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: esnaaf-hizmetveren
          image: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPO }}/esnaaf-hizmetveren:latest
          region: ${{ env.GCP_REGION }}
          flags: |
            --allow-unauthenticated
            --port=3000
            --min-instances=1
